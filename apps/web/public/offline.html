<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — RutaYa</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: #1E3A5F; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; box-sizing: border-box; }
    .card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 40px 32px; max-width: 360px; }
    .logo { font-size: 32px; font-weight: 900; margin-bottom: 16px; }
    .logo span { color: #F97316; }
    h2 { margin: 0 0 12px; font-size: 20px; }
    p { margin: 0 0 24px; color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.6; }
    button { background: #F97316; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>Ruta</span>Ya</div>
    <div style="font-size: 48px; margin-bottom: 16px;">📡</div>
    <h2>Sin conexión</h2>
    <p>Parece que no tienes internet. Conéctate para buscar pasajes y gestionar tus reservas.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
